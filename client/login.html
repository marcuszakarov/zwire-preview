<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zwire · Espace client</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal.css">
<style>
  body{display:flex;flex-direction:column;min-height:100vh}
  .login{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .card{width:100%;max-width:380px}
  .card .brand{font-size:1.6rem;display:block;text-align:center;margin-bottom:8px}
  .card .eyebrow{text-align:center;font-family:var(--mono);font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-3);margin-bottom:36px}
  label{display:block;font-family:var(--mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin:0 0 8px}
  input{width:100%;background:var(--panel);border:1px solid var(--line-2);border-radius:8px;color:var(--ink);font-family:var(--sans);font-size:1rem;padding:13px 14px;margin-bottom:20px}
  input:focus{outline:none;border-color:var(--gold)}
  .go{width:100%;display:block;text-align:center;background:var(--ink);color:var(--bg);border:1px solid var(--ink);border-radius:999px;font-family:var(--sans);font-weight:500;font-size:.92rem;padding:13px;transition:.2s}
  .go:hover{background:var(--gold);border-color:var(--gold)}
  .help{text-align:center;margin-top:22px;font-size:.84rem;color:var(--ink-2)}
  .help a{color:var(--gold)}
  .foot{text-align:center;margin-top:34px;font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;color:var(--ink-3);line-height:1.7;max-width:34ch;margin-left:auto;margin-right:auto}
</style>
</head>
<body>
  <div class="login">
    <div class="card">
      <span class="brand">Zwire<span class="d">.</span></span>
      <div class="eyebrow">Espace client &middot; confidentiel</div>
      <label for="u">Identifiant</label>
      <input id="u" type="text" autocomplete="username" placeholder="">
      <label for="p">Mot de passe</label>
      <input id="p" type="password" autocomplete="current-password" placeholder="">
      <a class="go" href="index.html">Se connecter</a>
      <p class="help">Un souci de connexion ? <a href="#contact">Contactez votre chargé de dossier.</a></p>
      <p class="foot">Accès strictement réservé. Session chiffrée, fermée automatiquement après inactivité. Ce portail ne contient que vos propres dossiers.</p>
    </div>
  </div>
</body>
</html>
